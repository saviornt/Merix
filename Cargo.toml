[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Saviornt"]
license = "Apache-2.0"
repository = "https://github.com/saviornt/Merix"
description = "Merix - Local-first self-extending AI runtime (PHASE 1 MVP)"
rust-version = "1.80"

[workspace]
members = [
    "crates/core",
    "crates/memory",
    "crates/mcp",
    "crates/skills",
    "crates/self-extension",
    "crates/cli",
    "models/"
]
resolver = "2"

[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
dashmap = "6.1"
uuid = { version = "1.10", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1.0"
surrealdb = { version = "2", features = ["kv-rocksdb"] }
async-trait = "0.1"
